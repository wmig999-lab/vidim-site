<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#f4f3ef">
<meta name="robots" content="noindex, nofollow">
<title>Vidim — Бриф</title>
<meta name="description" content="22 вопроса. 15 минут. Персональный отчёт о вашем операционном хаосе.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&family=Spectral:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ===== БАЗА ===== */
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg-light: #f4f3ef;
  --bg-card: #ffffff;
  --bg-dark: #0a0a0a;
  --text-dark: #1a1a1a;
  --text-soft: #3a3a3a;
  --text-dim: #6a7a6a;
  --text-light: #ffffff;
  --border-soft: #d8d4ca;
  --border-dim: #1a3a1a;
  --accent-green: #2a8a44;
  --accent-green-soft: #7acc8a;
  --accent-red: #ff5a5a;
  --accent-red-light: #ff7070;
  --error-red: #c53030;
  --font-mono: 'Courier Prime', 'Courier New', ui-monospace, monospace;
  --font-serif: 'Spectral', Georgia, 'PT Serif', serif;
  --radius-md: 8px;
  --radius-sm: 6px;
  --radius-lg: 12px;
}
html { scroll-behavior: smooth; }
body {
  font-family: var(--font-serif);
  background: var(--bg-light);
  color: var(--text-dark);
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
}
button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
input, textarea, select { font-family: inherit; }
a { color: inherit; text-decoration: none; }

#root { min-height: 100vh; display: flex; flex-direction: column; }
.app { flex: 1; display: flex; flex-direction: column; }
.screen { flex: 1; display: flex; flex-direction: column; padding: 40px 24px; max-width: 760px; width: 100%; margin: 0 auto; }
@media (min-width: 768px) { .screen { padding: 60px 32px; } }
.screen-wide { max-width: 920px; }

.brief-header { position: sticky; top: 0; background: rgba(244,243,239,0.92); backdrop-filter: blur(8px); border-bottom: 1px solid var(--border-soft); padding: 14px 24px; z-index: 10; }
.brief-header-inner { max-width: 760px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; gap: 16px; font-family: var(--font-mono); font-size: 13px; color: var(--text-dim); }
.brief-logo { font-weight: 700; color: var(--text-dark); letter-spacing: 0.5px; }
.progress-bar { flex: 1; height: 4px; background: var(--border-soft); border-radius: 2px; overflow: hidden; max-width: 300px; }
.progress-fill { height: 100%; background: var(--accent-green); transition: width 0.4s ease; }
.progress-text { white-space: nowrap; font-size: 12px; }

.terminal { font-family: var(--font-mono); font-size: 13px; color: var(--text-dim); letter-spacing: 0.5px; line-height: 1.8; margin-bottom: 28px; }
.terminal .accent { color: var(--accent-green); font-weight: 700; }
.terminal .red { color: var(--accent-red); }

h1, h2, h3 { font-family: var(--font-serif); font-weight: 500; color: var(--text-dark); }
h1 { font-size: clamp(28px, 4.5vw, 38px); line-height: 1.2; letter-spacing: -0.5px; margin-bottom: 16px; }
h2 { font-size: clamp(22px, 3.5vw, 28px); line-height: 1.25; letter-spacing: -0.3px; margin-bottom: 14px; }
h3 { font-size: 18px; line-height: 1.35; margin-bottom: 10px; }
h1 em, h2 em { font-style: italic; font-weight: 500; }
p { font-size: 16px; line-height: 1.7; color: var(--text-soft); margin-bottom: 16px; }
@media (min-width: 768px) { p { font-size: 17px; } }

.welcome { justify-content: center; min-height: calc(100vh - 60px); }
.welcome-checklist { background: var(--bg-card); border: 1px solid var(--border-soft); border-radius: var(--radius-lg); padding: 24px 28px; margin: 32px 0; }
.welcome-checklist-title { font-family: var(--font-mono); font-size: 12px; color: var(--text-dim); letter-spacing: 1.2px; margin-bottom: 14px; }
.welcome-checklist-item { display: flex; align-items: baseline; gap: 12px; padding: 10px 0; font-size: 16px; border-bottom: 1px dashed var(--border-soft); }
.welcome-checklist-item:last-child { border-bottom: 0; padding-bottom: 0; }
.welcome-checklist-item .mark { color: var(--accent-green); font-family: var(--font-mono); font-weight: 700; }
.welcome-meta { font-family: var(--font-mono); font-size: 12px; color: var(--text-dim); margin-top: 24px; line-height: 1.7; }

.btn-primary { background: var(--text-dark); color: #ffffff; padding: 16px 28px; border-radius: var(--radius-md); font-family: var(--font-mono); font-size: 15px; font-weight: 500; letter-spacing: 0.5px; transition: all 0.2s; display: inline-flex; align-items: center; justify-content: center; gap: 8px; }
.btn-primary:hover:not(:disabled), .btn-primary:focus-visible { background: var(--accent-red); outline: none; box-shadow: 0 4px 16px rgba(255,90,90,0.3); }
.btn-primary:disabled { background: #b0b0a8; cursor: not-allowed; opacity: 0.6; }
.btn-secondary { background: transparent; color: var(--text-dim); padding: 16px 20px; border-radius: var(--radius-md); font-family: var(--font-mono); font-size: 14px; transition: all 0.2s; }
.btn-secondary:hover { color: var(--text-dark); background: rgba(0,0,0,0.04); }

.question-screen { padding-top: 80px; }
.question-marker { font-family: var(--font-mono); font-size: 12px; color: var(--text-dim); letter-spacing: 1.2px; margin-bottom: 14px; }
.question-marker .green { color: var(--accent-green); font-weight: 700; }
.question-text { font-family: var(--font-serif); font-size: clamp(22px, 3vw, 26px); font-weight: 500; line-height: 1.35; color: var(--text-dark); margin-bottom: 8px; letter-spacing: -0.3px; }
.question-hint { font-family: var(--font-mono); font-size: 13px; color: var(--text-dim); margin-bottom: 32px; line-height: 1.6; }

.options-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 32px; }
.option-item { display: flex; align-items: center; gap: 14px; padding: 16px 20px; background: var(--bg-card); border: 1px solid var(--border-soft); border-radius: var(--radius-md); cursor: pointer; transition: all 0.18s; font-size: 16px; color: var(--text-dark); text-align: left; width: 100%; }
.option-item:hover { border-color: var(--text-dark); background: rgba(255,255,255,0.95); }
.option-item.selected { border-color: var(--text-dark); background: var(--text-dark); color: #ffffff; }
.option-item.selected .option-check { background: #ffffff; border-color: #ffffff; }
.option-item.selected .option-check::after { content: ''; width: 8px; height: 8px; background: var(--text-dark); border-radius: 50%; }
.option-check { width: 18px; height: 18px; border: 1.5px solid var(--border-soft); border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all 0.18s; }
.option-check.checkbox { border-radius: 4px; }
.option-item.selected .option-check.checkbox::after { width: 10px; height: 6px; border: 2px solid var(--text-dark); border-top: 0; border-right: 0; transform: rotate(-45deg); margin-top: -2px; background: transparent; border-radius: 0; }
.option-counter { font-family: var(--font-mono); font-size: 12px; color: var(--text-dim); margin-top: -20px; margin-bottom: 24px; text-align: right; }

.textarea-field { width: 100%; background: var(--bg-card); border: 1px solid var(--border-soft); border-radius: var(--radius-md); padding: 16px 20px; font-size: 16px; color: var(--text-dark); font-family: var(--font-serif); resize: vertical; min-height: 120px; margin-bottom: 8px; transition: border-color 0.18s; line-height: 1.6; }
.textarea-field:focus { outline: none; border-color: var(--text-dark); }
.textarea-counter { font-family: var(--font-mono); font-size: 12px; color: var(--text-dim); text-align: right; margin-bottom: 24px; }
.textarea-counter.over { color: var(--error-red); }

.slider-wrap { margin: 28px 0 32px; }
.slider-value { font-family: var(--font-mono); font-size: 14px; color: var(--text-dim); text-align: center; margin-bottom: 12px; }
.slider-value strong { color: var(--accent-green); font-size: 20px; font-weight: 700; }
.slider-input { width: 100%; -webkit-appearance: none; appearance: none; height: 4px; background: var(--border-soft); border-radius: 2px; outline: none; cursor: pointer; }
.slider-input::-webkit-slider-thumb { -webkit-appearance: none; width: 22px; height: 22px; background: var(--text-dark); border-radius: 50%; cursor: pointer; transition: all 0.15s; }
.slider-input::-webkit-slider-thumb:hover { background: var(--accent-red); transform: scale(1.1); }
.slider-input::-moz-range-thumb { width: 22px; height: 22px; background: var(--text-dark); border-radius: 50%; cursor: pointer; border: 0; }
.slider-labels { display: flex; justify-content: space-between; margin-top: 10px; font-family: var(--font-mono); font-size: 12px; color: var(--text-dim); }

.email-form { display: flex; flex-direction: column; gap: 16px; margin: 28px 0 16px; }
.input-field { width: 100%; background: var(--bg-card); border: 1px solid var(--border-soft); border-radius: var(--radius-md); padding: 16px 20px; font-size: 17px; color: var(--text-dark); transition: border-color 0.18s; }
.input-field:focus { outline: none; border-color: var(--text-dark); }
.input-field.invalid { border-color: var(--error-red); }
.field-error { font-family: var(--font-mono); font-size: 12px; color: var(--error-red); margin-top: -8px; }
.consent-row { display: flex; align-items: flex-start; gap: 12px; font-size: 14px; color: var(--text-soft); cursor: pointer; line-height: 1.55; }
.consent-checkbox { width: 18px; height: 18px; border: 1.5px solid var(--border-soft); border-radius: 4px; flex-shrink: 0; margin-top: 2px; display: flex; align-items: center; justify-content: center; transition: all 0.18s; background: var(--bg-card); }
.consent-row.checked .consent-checkbox { background: var(--text-dark); border-color: var(--text-dark); }
.consent-row.checked .consent-checkbox::after { content: ''; width: 10px; height: 6px; border: 2px solid #ffffff; border-top: 0; border-right: 0; transform: rotate(-45deg); margin-top: -2px; }

.question-nav { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-top: auto; padding-top: 24px; border-top: 1px dashed var(--border-soft); flex-wrap: wrap; }
.question-nav > div:last-child { display: flex; gap: 8px; flex-wrap: wrap; }
@media (max-width: 480px) {
  .question-nav { flex-direction: column; align-items: stretch; }
  .question-nav > div:last-child { flex-direction: column; }
  .question-nav .btn-secondary, .question-nav .btn-primary { width: 100%; text-align: center; justify-content: center; }
}
.nav-info { font-family: var(--font-mono); font-size: 12px; color: var(--text-dim); }
.save-indicator { color: var(--accent-green); }

.analyzing-screen { background: var(--bg-dark); color: var(--text-light); min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 40px 24px; position: relative; overflow: hidden; }
.analyzing-content { position: relative; z-index: 2; max-width: 720px; width: 100%; }
.analyzing-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; opacity: 0.7; }
.analyzing-title { font-family: var(--font-serif); font-size: clamp(32px, 4.5vw, 42px); font-weight: 600; color: var(--text-light); letter-spacing: -1px; margin-bottom: 12px; text-shadow: 0 0 16px #000, 0 0 8px #000; }
.analyzing-subtitle { font-family: var(--font-mono); font-size: 14px; color: #d0d0d0; margin-bottom: 36px; text-shadow: 0 0 12px #000; }
.analyzing-log { font-family: var(--font-mono); font-size: 14px; line-height: 2; background: rgba(0,0,0,0.7); border: 1px solid var(--border-dim); border-radius: var(--radius-md); padding: 24px 28px; max-height: 360px; overflow: hidden; }
.log-line { color: var(--accent-green-soft); opacity: 0; animation: logAppear 0.4s ease forwards; }
.log-line.done { color: #b8b8b8; }
.log-line.highlight { color: #ffd070; font-weight: 700; }
.log-cursor { display: inline-block; width: 8px; height: 14px; background: var(--accent-green-soft); margin-left: 4px; animation: cursorBlink 0.8s steps(2) infinite; vertical-align: middle; }
@keyframes logAppear { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
@keyframes cursorBlink { 50% { opacity: 0; } }

.report-screen { padding-top: 60px; }
.report-header { font-family: var(--font-mono); font-size: 12px; color: var(--text-dim); letter-spacing: 1px; margin-bottom: 16px; padding-bottom: 14px; border-bottom: 1px dashed var(--border-soft); display: flex; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
.report-header .green { color: var(--accent-green); font-weight: 700; }
.report-title { font-family: var(--font-serif); font-size: clamp(32px, 4.5vw, 42px); font-weight: 600; color: var(--text-dark); letter-spacing: -0.8px; line-height: 1.15; margin-bottom: 12px; }
.report-title em { font-style: italic; font-weight: 500; }
.report-subtitle { font-family: var(--font-mono); font-size: 13px; color: var(--text-dim); margin-bottom: 32px; line-height: 1.7; }

.report-section { margin-bottom: 36px; }
.report-section-marker { font-family: var(--font-mono); font-size: 11px; color: var(--text-dim); letter-spacing: 1.2px; margin-bottom: 12px; }
.report-section-marker .green { color: var(--accent-green); font-weight: 700; }
.report-section h3 { font-family: var(--font-serif); font-size: 22px; font-weight: 500; color: var(--text-dark); margin-bottom: 14px; line-height: 1.3; }
.report-section p { font-family: var(--font-serif); font-size: 16px; line-height: 1.75; color: var(--text-soft); margin-bottom: 14px; }

.profile-card { background: var(--bg-card); border: 1px solid var(--border-soft); border-radius: var(--radius-lg); padding: 24px 28px; }
.profile-row { display: grid; grid-template-columns: 200px 1fr; gap: 12px; padding: 12px 0; border-bottom: 1px dashed var(--border-soft); font-size: 15px; }
.profile-row:last-child { border-bottom: 0; padding-bottom: 0; }
.profile-row .label { font-family: var(--font-mono); font-size: 12px; color: var(--text-dim); letter-spacing: 0.5px; padding-top: 3px; }
.profile-row .value { font-family: var(--font-serif); color: var(--text-dark); font-weight: 500; }
@media (max-width: 600px) { .profile-row { grid-template-columns: 1fr; gap: 4px; } }

.risks-grid { display: flex; flex-direction: column; gap: 14px; }
.risk-card { background: var(--bg-dark); border: 1px solid var(--border-dim); border-radius: var(--radius-md); padding: 22px 26px; color: var(--text-light); }
.risk-card-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 12px; flex-wrap: wrap; gap: 8px; }
.risk-card-code { font-family: var(--font-mono); font-size: 12px; color: var(--accent-red); letter-spacing: 1.2px; font-weight: 700; }
.risk-card-severity { font-family: var(--font-mono); font-size: 11px; letter-spacing: 1px; padding: 3px 8px; border-radius: 4px; background: rgba(255,90,90,0.15); color: #ffb070; border: 1px solid rgba(255,180,112,0.3); }
.risk-card-severity.high { background: rgba(255,90,90,0.2); color: #ff9090; }
.risk-card-title { font-family: var(--font-mono); font-size: 15px; color: var(--text-light); margin-bottom: 10px; font-weight: 500; line-height: 1.45; }
.risk-card-impact { font-family: var(--font-mono); font-size: 13px; color: #b8b8b8; line-height: 1.6; padding-top: 12px; border-top: 1px dashed var(--border-dim); }

.recommendations-list { background: var(--bg-card); border: 1px solid var(--border-soft); border-radius: var(--radius-md); padding: 20px 24px; }
.rec-item { display: flex; gap: 14px; padding: 14px 0; border-bottom: 1px dashed var(--border-soft); font-family: var(--font-serif); font-size: 15px; line-height: 1.65; color: var(--text-soft); }
.rec-item:last-child { border-bottom: 0; padding-bottom: 0; }
.rec-item .num { font-family: var(--font-mono); font-size: 12px; color: var(--accent-green); font-weight: 700; letter-spacing: 1px; flex-shrink: 0; padding-top: 4px; }

.next-step-card { background: var(--text-dark); color: var(--text-light); border-radius: var(--radius-lg); padding: 32px; }
.next-step-marker { font-family: var(--font-mono); font-size: 11px; color: var(--accent-green-soft); letter-spacing: 1.2px; margin-bottom: 12px; }
.next-step-card h3 { font-family: var(--font-serif); font-size: 26px; color: var(--text-light); font-weight: 500; margin-bottom: 12px; line-height: 1.25; }
.next-step-card .price-line { font-family: var(--font-mono); font-size: 14px; color: #ffb070; margin-bottom: 16px; }
.next-step-card .why { font-family: var(--font-serif); font-size: 15px; line-height: 1.7; color: #e0e0e0; margin-bottom: 18px; }
.guarantees-line { font-family: var(--font-mono); font-size: 12px; color: var(--accent-green-soft); line-height: 1.85; padding: 14px 16px; background: rgba(122,204,138,0.08); border: 1px solid rgba(42,138,68,0.3); border-radius: var(--radius-sm); margin-bottom: 20px; }
.next-step-card .btn-cta { background: var(--accent-red); color: #ffffff; padding: 16px 28px; border-radius: var(--radius-md); font-family: var(--font-mono); font-size: 14px; font-weight: 500; letter-spacing: 0.5px; transition: all 0.2s; display: inline-block; margin-right: 12px; }
.next-step-card .btn-cta:hover { background: var(--accent-red-light); box-shadow: 0 4px 20px rgba(255,90,90,0.35); }
.next-step-card .btn-pdf { display: inline-block; font-family: var(--font-mono); font-size: 13px; color: #a0a0a0; padding: 16px 0; border-bottom: 1px dashed #555; transition: color 0.2s; }
.next-step-card .btn-pdf:hover { color: var(--text-light); }

.report-footer { font-family: var(--font-mono); font-size: 12px; color: var(--text-dim); margin-top: 40px; padding-top: 20px; border-top: 1px dashed var(--border-soft); line-height: 1.7; }

.fade-enter { animation: fadeSlide 0.4s ease forwards; }
@keyframes fadeSlide { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
@media (prefers-reduced-motion: reduce) {
  .fade-enter { animation: none; }
  .log-line { animation-duration: 0.01ms; opacity: 1 !important; }
  .log-cursor { animation: none; }
  .analyzing-canvas { opacity: 0.2; }
  * { transition-duration: 0.01ms !important; }
}

.subtle-link { font-family: var(--font-mono); font-size: 13px; color: var(--text-dim); border-bottom: 1px dashed currentColor; transition: color 0.2s; }
.subtle-link:hover { color: var(--text-dark); }
.error-banner { background: #fff4f0; border: 1px solid #f4b9a0; border-left: 3px solid var(--error-red); border-radius: var(--radius-sm); padding: 14px 18px; margin: 16px 0; font-family: var(--font-mono); font-size: 13px; color: #a03020; line-height: 1.6; }
.info-banner { background: rgba(122,204,138,0.08); border: 1px solid rgba(42,138,68,0.3); border-radius: var(--radius-sm); padding: 12px 16px; font-family: var(--font-mono); font-size: 12px; color: var(--accent-green); margin: 12px 0; }

</style>
</head>
