<!DOCTYPE html>
<html lang="ru" class="no-js">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#fbfcfe">
<meta name="robots" content="noindex, nofollow">
<title>Vidim — Бриф</title>
<meta name="description" content="6 вопросов. 5 минут. Персональный ИИ-отчёт о рисках вашего бизнеса.">
<link rel="preconnect" href="https://fonts.bunny.net" crossorigin>
<link href="https://fonts.bunny.net/css?family=onest:300,400,500,600,700,800|spline-sans-mono:400,500&display=swap" rel="stylesheet">
<script>document.documentElement.className='js';</script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#fbfcfe;--surface:#f2f3f7;--surface-2:#eaecf2;
  --ink:#12161f;--ink-2:#4d535e;--muted:#70747e;
  --line:#dde0e4;--line-2:#e7e9ee;
  --accent:#4252cd;--accent-d:#3845bf;--accent-t:#eceef9;
  --signal:#b64c1b;--signal-t:#9e441d;--ok:#1a6b3a;
  --sans:'Onest',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  --mono:'Spline Sans Mono',ui-monospace,'SF Mono',Menlo,monospace;
  --r:12px;--r-s:8px;--e:cubic-bezier(.22,1,.36,1);
}
html{-webkit-text-size-adjust:100%;}
body{font-family:var(--sans);background:var(--bg);color:var(--ink);line-height:1.6;-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;flex-direction:column;}
a{color:var(--accent);text-decoration:none;}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
::selection{background:var(--accent);color:#fff;}
.mono{font-family:var(--mono);}

/* header */
.hd{position:sticky;top:0;z-index:50;background:color-mix(in srgb,var(--bg) 90%,transparent);backdrop-filter:blur(12px);border-bottom:1px solid var(--line);}
.hd .in{max-width:720px;margin:0 auto;padding:0 22px;height:64px;display:flex;align-items:center;justify-content:space-between;gap:16px;}
.brand{display:flex;align-items:baseline;gap:10px;}
.brand b{font-weight:700;font-size:20px;letter-spacing:-.03em;}
.brand span{font-size:12.5px;color:var(--muted);}
@media(max-width:520px){.brand span{display:none;}}
.step-ind{font-family:var(--mono);font-size:12.5px;color:var(--muted);}
.step-ind b{color:var(--ink);font-weight:500;}
/* progress */
.pbar{height:3px;background:var(--surface-2);}
.pbar .fill{height:100%;background:var(--accent);width:0;transition:width .5s var(--e);}

/* main */
main{flex:1;width:100%;max-width:720px;margin:0 auto;padding:clamp(32px,6vw,60px) 22px 80px;}
.q-eyebrow{font-family:var(--mono);font-size:12.5px;color:var(--accent);margin-bottom:14px;}
.q-title{font-size:clamp(1.55rem,4.4vw,2.15rem);font-weight:700;letter-spacing:-.03em;line-height:1.12;text-wrap:balance;margin-bottom:10px;}
.q-help{font-size:15px;color:var(--ink-2);line-height:1.55;margin-bottom:30px;text-wrap:pretty;}

.field{margin-bottom:28px;}
.field:last-of-type{margin-bottom:0;}
.field > label.fl{display:block;font-size:14.5px;font-weight:600;letter-spacing:-.01em;margin-bottom:12px;}
.field .fl .opt{color:var(--muted);font-weight:400;font-size:13px;}

/* chips */
.chips{display:flex;flex-wrap:wrap;gap:9px;}
.chip{display:inline-flex;align-items:center;gap:8px;padding:11px 16px;border:1px solid var(--line);border-radius:999px;background:var(--bg);font-size:14.5px;color:var(--ink-2);font-weight:500;transition:border-color .18s,background .18s,color .18s,transform .12s var(--e);user-select:none;}
.chip:hover{border-color:var(--ink-2);color:var(--ink);}
.chip:active{transform:scale(.97);}
.chip.sel{background:var(--accent);border-color:var(--accent);color:#fff;}
.chip .ck{width:15px;height:15px;opacity:0;transition:opacity .15s;margin-left:-2px;}
.chip.sel .ck{opacity:1;}

/* option cards (single scale) */
.opts{display:grid;gap:10px;}
.opt-card{display:flex;align-items:flex-start;gap:13px;padding:16px 18px;border:1px solid var(--line);border-radius:var(--r-s);background:var(--bg);cursor:pointer;transition:border-color .18s,background .18s,transform .12s var(--e);text-align:left;width:100%;}
.opt-card:hover{border-color:var(--ink-2);}
.opt-card:active{transform:scale(.995);}
.opt-card.sel{border-color:var(--accent);background:var(--accent-t);}
.opt-card .radio{width:19px;height:19px;border-radius:50%;border:2px solid var(--line);flex-shrink:0;margin-top:2px;transition:border-color .18s;position:relative;}
.opt-card.sel .radio{border-color:var(--accent);}
.opt-card.sel .radio::after{content:"";position:absolute;inset:3px;border-radius:50%;background:var(--accent);}
.opt-card .ot{display:block;font-size:14.5px;font-weight:500;color:var(--ink);line-height:1.4;}
.opt-card .od{display:block;font-size:13px;color:var(--muted);margin-top:3px;line-height:1.45;}

/* inputs */
input[type=text],input[type=email],input[type=tel],textarea,select{width:100%;font-family:inherit;font-size:15px;color:var(--ink);background:var(--bg);border:1px solid var(--line);border-radius:var(--r-s);padding:13px 15px;transition:border-color .18s,box-shadow .18s;}
textarea{min-height:96px;resize:vertical;line-height:1.55;}
input:focus,textarea:focus,select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-t);}
input::placeholder,textarea::placeholder{color:var(--muted);}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
@media(max-width:520px){.grid2{grid-template-columns:1fr;}}

/* consent */
.consent{display:flex;gap:11px;align-items:flex-start;font-size:12.5px;color:var(--muted);line-height:1.5;margin-top:6px;}
.consent input{width:17px;height:17px;flex-shrink:0;margin-top:1px;accent-color:var(--accent);}

/* nav */
.nav{display:flex;align-items:center;justify-content:space-between;gap:14px;margin-top:38px;padding-top:26px;border-top:1px solid var(--line);}
.btn{display:inline-flex;align-items:center;gap:9px;border-radius:var(--r-s);font-weight:600;font-size:15.5px;letter-spacing:-.01em;transition:background .2s,transform .18s var(--e),opacity .2s,color .2s;}
.btn-p{background:var(--accent);color:#fff;padding:14px 28px;}
.btn-p:hover{background:var(--accent-d);transform:translateY(-1px);}
.btn-p:disabled{background:var(--surface-2);color:var(--muted);cursor:not-allowed;transform:none;}
.btn-p svg{width:15px;height:15px;transition:transform .25s var(--e);}
.btn-p:not(:disabled):hover svg{transform:translateX(3px);}
.btn-back{color:var(--muted);font-size:14.5px;font-weight:500;padding:10px 4px;}
.btn-back:hover{color:var(--ink);}
.btn-back:disabled{opacity:0;pointer-events:none;}
.err{color:var(--signal-t);font-size:13px;margin-top:12px;min-height:0;}

/* step transition */
.step-wrap{animation:stepIn .4s var(--e);}
@keyframes stepIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}
@media(prefers-reduced-motion:reduce){.step-wrap{animation:none;}.pbar .fill{transition:none;}}

/* loading */
.load{text-align:center;padding:60px 0;}
.spinner{width:44px;height:44px;margin:0 auto 26px;border-radius:50%;border:3px solid var(--surface-2);border-top-color:var(--accent);animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.load h2{font-size:1.4rem;font-weight:700;letter-spacing:-.02em;margin-bottom:10px;}
.load p{color:var(--ink-2);font-size:15px;}
.load .phase{font-family:var(--mono);font-size:13px;color:var(--muted);margin-top:18px;min-height:20px;}

/* ---------- REPORT ---------- */
.report{animation:stepIn .5s var(--e);}
.rep-top{margin-bottom:34px;}
.rep-top .tag{font-family:var(--mono);font-size:12.5px;color:var(--accent);margin-bottom:12px;display:block;}
.rep-top h1{font-size:clamp(1.6rem,4.5vw,2.2rem);font-weight:700;letter-spacing:-.03em;line-height:1.12;margin-bottom:14px;text-wrap:balance;}
.rep-summary{font-size:16px;color:var(--ink-2);line-height:1.6;text-wrap:pretty;}
.profile{display:flex;flex-wrap:wrap;gap:8px;margin:22px 0 4px;}
.pill{font-family:var(--mono);font-size:12px;padding:6px 12px;border-radius:999px;background:var(--surface);border:1px solid var(--line);color:var(--ink-2);}
.pill b{color:var(--ink);font-weight:500;}

.rep-sec{margin-top:40px;}
.rep-sec > h2{font-size:1.02rem;font-weight:700;letter-spacing:-.01em;margin-bottom:18px;display:flex;align-items:center;gap:10px;}
.rep-sec > h2 .mono{font-family:var(--mono);font-size:12px;color:var(--muted);font-weight:400;}

.risk{border:1px solid var(--line);border-radius:var(--r);padding:20px 22px;margin-bottom:14px;background:var(--bg);}
.risk-h{display:flex;align-items:flex-start;gap:12px;margin-bottom:10px;}
.risk-sev{flex-shrink:0;width:9px;height:9px;border-radius:50%;margin-top:7px;background:var(--signal);box-shadow:0 0 0 3px color-mix(in srgb,var(--signal) 16%,transparent);}
.risk-sev.high{background:var(--signal);}
.risk-sev.medium{background:var(--muted);box-shadow:0 0 0 3px color-mix(in srgb,var(--muted) 16%,transparent);}
.risk-sev.critical{background:#c0281a;box-shadow:0 0 0 3px rgba(192,40,26,.18);}
.risk-h h3{font-size:1.05rem;font-weight:600;letter-spacing:-.01em;line-height:1.3;}
.risk-h .sevlbl{font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.03em;color:var(--signal-t);margin-left:auto;flex-shrink:0;padding-top:2px;}
.risk p{font-size:14px;color:var(--ink-2);line-height:1.55;margin-bottom:8px;}
.risk p:last-child{margin-bottom:0;}
.risk .lab{font-weight:600;color:var(--ink);}
.risk .impact{color:var(--signal-t);}

.rec{display:flex;gap:14px;padding:16px 0;border-bottom:1px solid var(--line-2);}
.rec:last-child{border-bottom:none;}
.rec .horizon{font-family:var(--mono);font-size:11px;color:var(--accent);background:var(--accent-t);padding:5px 9px;border-radius:5px;height:fit-content;white-space:nowrap;flex-shrink:0;}
.rec h4{font-size:14.5px;font-weight:600;margin-bottom:4px;letter-spacing:-.01em;}
.rec p{font-size:13.5px;color:var(--ink-2);line-height:1.5;}

.hypo{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:22px 24px;font-size:15px;color:var(--ink);line-height:1.6;}
.hypo .lab{font-family:var(--mono);font-size:12px;color:var(--accent);display:block;margin-bottom:10px;}

/* next step card */
.next{background:var(--ink);color:#fff;border-radius:var(--r);padding:clamp(24px,4vw,34px);margin-top:40px;}
.next .ns-tag{font-family:var(--mono);font-size:12px;color:#8f96de;margin-bottom:12px;}
.next h2{font-size:1.4rem;font-weight:700;letter-spacing:-.02em;color:#fff;margin-bottom:8px;}
.next .ns-meta{font-family:var(--mono);font-size:13px;color:#a7b0ff;margin-bottom:16px;}
.next p{font-size:14.5px;color:#c3c7d6;line-height:1.6;margin-bottom:16px;}
.next .guarantees{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:22px;}
.next .g{font-size:12.5px;color:#c3c7ff;background:rgba(167,176,255,.14);padding:6px 12px;border-radius:999px;}
.next .ns-btn{display:inline-flex;align-items:center;gap:9px;background:var(--accent);color:#fff;padding:14px 26px;border-radius:var(--r-s);font-weight:600;font-size:15.5px;transition:background .2s,transform .18s var(--e);}
.next .ns-btn:hover{background:var(--accent-d);transform:translateY(-1px);}

.rep-foot{margin-top:30px;font-size:12.5px;color:var(--muted);line-height:1.6;text-align:center;}

.notice{background:var(--accent-t);border:1px solid color-mix(in srgb,var(--accent) 25%,transparent);border-radius:var(--r-s);padding:14px 16px;font-size:13.5px;color:var(--accent-d);line-height:1.5;margin-bottom:24px;}
</style>
</head>
<body>

<header class="hd">
  <div class="in">
    <a href="https://vidim.site" class="brand"><b>Vidim</b><span>диагностический бриф</span></a>
    <div class="step-ind" id="stepInd"></div>
  </div>
</header>
<div class="pbar"><div class="fill" id="pfill"></div></div>

<main id="app"></main>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<script>
/* =====================================================================
   Vidim brief — v2.0 (6 вопросов + контакты)
   Вопросы описаны данными → легко править. Интеграции:
     · POST /api/generate-report (Claude через Vercel-функцию)
     · EmailJS: уведомление в hello@ + отчёт клиенту
   ===================================================================== */

const EMAILJS = {
  publicKey: 'Xvg10AeigkaR_anxB',
  service:   'service_c8kqi5s',
  tplNotify: 'template_jakea23',   // → hello@vidim.site
  tplReport: 'template_6oo9hwy'    // → клиенту
};
if (window.emailjs) emailjs.init({ publicKey: EMAILJS.publicKey });

/* ---- Схема брифа: 6 вопросов + контакты ------------------------------ */
const STEPS = [
  {
    id: 'company', eyebrow: 'Вопрос 1 из 6', title: 'Коротко о компании',
    help: 'С этого начинается профиль. Чем точнее — тем полезнее отчёт.',
    fields: [
      { key: 'industry', label: 'Отрасль / чем занимаетесь', kind: 'text', required: true, placeholder: 'напр. производство мебели, оптовая торговля, логистика' },
      { key: 'size', label: 'Сколько сотрудников', kind: 'single-inline', required: true,
        options: ['до 50', '50–100', '100–250', '250–500', '500+'] },
      { key: 'revenue', label: 'Годовая выручка', kind: 'single-inline', required: true,
        options: ['до 100 млн ₽', '100–500 млн ₽', '500 млн – 1 млрд ₽', '1–5 млрд ₽', '> 5 млрд ₽', 'не скажу'] },
      { key: 'role', label: 'Ваша роль', kind: 'single-inline', required: true,
        options: ['Собственник', 'Гендиректор', 'Топ-менеджер', 'Другое'] }
    ]
  },
  {
    id: 'pain', eyebrow: 'Вопрос 2 из 6', title: 'Что сейчас болит сильнее всего?',
    help: 'Отметьте всё, что откликается, и добавьте пару слов от себя.',
    fields: [
      { key: 'pains', label: 'Зоны боли', sub: 'можно несколько', kind: 'multi', required: true,
        options: ['Падение маржи', 'Кассовый разрыв', 'Дебиторка растёт', 'Зависимость от людей',
                  'Рост без управляемости', 'Конфликт подразделений', 'Устаревшие данные',
                  'Хаос в процессах', 'Текучка / кадры', 'Не вижу реальной картины'] },
      { key: 'painText', label: 'Своими словами', sub: 'необязательно', kind: 'textarea', required: false,
        placeholder: 'Что именно происходит и почему это беспокоит?' }
    ]
  },
  {
    id: 'data', eyebrow: 'Вопрос 3 из 6', title: 'Как вы принимаете управленческие решения?',
    help: 'Это показывает зрелость данных — насколько вы управляете фактами, а не ощущениями.',
    fields: [
      { key: 'dataMaturity', kind: 'single', required: true, options: [
        { v: 'Регулярные отчёты и BI-дашборды, данные свежие', d: 'Вижу ключевые метрики почти в реальном времени' },
        { v: 'Отчёты есть, но опаздывают или собираются вручную', d: 'Картина приходит с задержкой в дни-недели' },
        { v: 'Смотрю в 1С / Excel по запросу', d: 'Данные есть, но единой картины нет' },
        { v: 'В основном по интуиции и опыту', d: 'Системной аналитики почти нет' }
      ] }
    ]
  },
  {
    id: 'dependency', eyebrow: 'Вопрос 4 из 6', title: 'Насколько бизнес зависит от вас и «незаменимых»?',
    help: 'Зависимость от отдельных людей — один из самых недооценённых рисков.',
    fields: [
      { key: 'ownerDependency', kind: 'single', required: true, options: [
        { v: 'Собственник вышел из операционки', d: 'Процессы работают без ежедневного участия' },
        { v: 'Ключевые решения всё ещё на собственнике', d: 'Без меня важное встаёт' },
        { v: 'Держится на 1–2 незаменимых людях', d: 'Их уход — серьёзный сбой' },
        { v: 'Всё замыкается на собственнике лично', d: 'Ручное управление почти во всём' }
      ] }
    ]
  },
  {
    id: 'tried', eyebrow: 'Вопрос 5 из 6', title: 'Что уже пробовали навести порядок?',
    help: 'История прошлых попыток многое говорит о корневой причине.',
    fields: [
      { key: 'tried', label: 'Что делали и почему не сработало', kind: 'textarea', required: true,
        placeholder: 'напр. внедряли CRM — не прижилась; нанимали операционного директора — ушёл через полгода; писали регламенты — их не читают…' }
    ]
  },
  {
    id: 'goal', eyebrow: 'Вопрос 6 из 6', title: 'Чего вы хотите на выходе?',
    help: 'Цель, готовность и горизонт помогают подобрать реалистичный формат работы.',
    fields: [
      { key: 'successResult', label: 'Что для вас — успешный результат?', kind: 'textarea', required: true,
        placeholder: 'напр. вижу прибыль по каждому направлению; выхожу из операционки; маржа +5 п.п.' },
      { key: 'readiness', label: 'Готовность к серьёзным изменениям', kind: 'single-inline', required: true,
        options: ['Высокая — готовы менять', 'Средняя — зависит от аргументов', 'Низкая — сначала посмотрим'] },
      { key: 'horizon', label: 'Когда хотите первые результаты', kind: 'single-inline', required: true,
        options: ['1 месяц', '3 месяца', '6 месяцев', 'год+'] },
      { key: 'budget', label: 'Ориентир бюджета на изменения', sub: 'необязательно', kind: 'single-inline', required: false,
        options: ['до 200к ₽', '200–600к ₽', '600к – 2 млн ₽', '> 2 млн ₽', 'пока не определились'] }
    ]
  },
  {
    id: 'contacts', eyebrow: 'Последний шаг', title: 'Куда прислать отчёт?',
    help: 'ИИ-отчёт придёт на почту сразу. Без звонков без вашей просьбы.',
    fields: [
      { key: 'name', label: 'Имя', kind: 'text', required: true, placeholder: 'Как к вам обращаться' },
      { key: 'company', label: 'Компания', kind: 'text', required: true, placeholder: 'Название' },
      { key: 'email', label: 'Email', kind: 'email', required: true, placeholder: 'you@company.ru' },
      { key: 'phone', label: 'Телефон', sub: 'необязательно', kind: 'tel', required: false, placeholder: '+7' }
    ]
  }
];

/* ---- Состояние -------------------------------------------------------- */
const state = { i: 0, a: {} };
const app = document.getElementById('app');
const pfill = document.getElementById('pfill');
const stepInd = document.getElementById('stepInd');
const esc = s => String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

/* ---- Рендер шага ------------------------------------------------------ */
function render() {
  const step = STEPS[state.i];
  const total = STEPS.length;
  pfill.style.width = (state.i / total * 100) + '%';
  stepInd.innerHTML = `<b>${state.i + 1}</b> / ${total}`;

  let html = `<div class="step-wrap"><div class="q-eyebrow">${esc(step.eyebrow)}</div>
    <h1 class="q-title">${esc(step.title)}</h1>
    <p class="q-help">${esc(step.help)}</p>`;

  for (const f of step.fields) html += renderField(f);

  html += `<div class="err" id="err"></div>
    <div class="nav">
      <button class="btn-back" id="back"${state.i === 0 ? ' disabled' : ''}>← Назад</button>
      <button class="btn btn-p" id="next">${step.id === 'contacts' ? 'Получить отчёт' : 'Далее'}
        <svg viewBox="0 0 24 24" fill="none"><path d="M5 12h14M13 6l6 6-6 6" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </div></div>`;

  app.innerHTML = html;
  bind(step);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function renderField(f) {
  const lbl = f.label ? `<label class="fl">${esc(f.label)}${f.sub ? ` <span class="opt">· ${esc(f.sub)}</span>` : ''}</label>` : '';
  let body = '';
  const val = state.a[f.key];

  if (f.kind === 'text' || f.kind === 'email' || f.kind === 'tel') {
    const t = f.kind === 'email' ? 'email' : f.kind === 'tel' ? 'tel' : 'text';
    body = `<input type="${t}" data-k="${f.key}" value="${val ? esc(val) : ''}" placeholder="${esc(f.placeholder || '')}">`;
  } else if (f.kind === 'textarea') {
    body = `<textarea data-k="${f.key}" placeholder="${esc(f.placeholder || '')}">${val ? esc(val) : ''}</textarea>`;
  } else if (f.kind === 'single-inline') {
    body = `<div class="chips" data-k="${f.key}" data-mode="single">` +
      f.options.map(o => `<button type="button" class="chip${val === o ? ' sel' : ''}" data-v="${esc(o)}">${chk()}${esc(o)}</button>`).join('') + `</div>`;
  } else if (f.kind === 'multi') {
    const arr = Array.isArray(val) ? val : [];
    body = `<div class="chips" data-k="${f.key}" data-mode="multi">` +
      f.options.map(o => `<button type="button" class="chip${arr.includes(o) ? ' sel' : ''}" data-v="${esc(o)}">${chk()}${esc(o)}</button>`).join('') + `</div>`;
  } else if (f.kind === 'single') {
    body = `<div class="opts" data-k="${f.key}" data-mode="card">` +
      f.options.map(o => `<button type="button" class="opt-card${val === o.v ? ' sel' : ''}" data-v="${esc(o.v)}">
        <span class="radio"></span><span><span class="ot">${esc(o.v)}</span>${o.d ? `<span class="od">${esc(o.d)}</span>` : ''}</span></button>`).join('') + `</div>`;
  }

  let extra = '';
  if (f.key === 'phone') {
    extra = `<label class="consent"><input type="checkbox" id="consent" ${state.a._consent ? 'checked' : ''}>
      <span>Согласен на обработку персональных данных согласно <a href="https://vidim.site/privacy.html" target="_blank" rel="noopener">политике конфиденциальности</a> (152-ФЗ). NDA подписываем до начала работ.</span></label>`;
  }
  return `<div class="field">${lbl}${body}${extra}</div>`;
}
const chk = () => `<svg class="ck" viewBox="0 0 24 24" fill="none"><path d="M20 6 9 17l-5-5" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/></svg>`;

/* ---- Обработчики ------------------------------------------------------ */
function bind(step) {
  app.querySelectorAll('input,textarea').forEach(el => {
    el.addEventListener('input', () => {
      if (el.id === 'consent') { state.a._consent = el.checked; return; }
      state.a[el.dataset.k] = el.value;
    });
  });
  app.querySelectorAll('.chips[data-mode=single] .chip, .opts .opt-card').forEach(el => {
    el.addEventListener('click', () => {
      const wrap = el.closest('[data-k]'); const k = wrap.dataset.k;
      wrap.querySelectorAll('.sel').forEach(x => x.classList.remove('sel'));
      el.classList.add('sel'); state.a[k] = el.dataset.v; clearErr();
    });
  });
  app.querySelectorAll('.chips[data-mode=multi] .chip').forEach(el => {
    el.addEventListener('click', () => {
      const wrap = el.closest('[data-k]'); const k = wrap.dataset.k;
      const arr = Array.isArray(state.a[k]) ? state.a[k] : [];
      const v = el.dataset.v; const at = arr.indexOf(v);
      if (at >= 0) arr.splice(at, 1); else arr.push(v);
      state.a[k] = arr; el.classList.toggle('sel'); clearErr();
    });
  });
  app.querySelector('#next').addEventListener('click', onNext);
  const back = app.querySelector('#back');
  if (back) back.addEventListener('click', () => { if (state.i > 0) { state.i--; render(); } });
}
function clearErr() { const e = document.getElementById('err'); if (e) e.textContent = ''; }
function showErr(m) { const e = document.getElementById('err'); if (e) e.textContent = m; }

function validate(step) {
  for (const f of step.fields) {
    if (!f.required) continue;
    const v = state.a[f.key];
    if (f.kind === 'multi') { if (!Array.isArray(v) || !v.length) return 'Выберите хотя бы один вариант.'; }
    else if (!v || !String(v).trim()) return 'Заполните обязательные поля.';
    if (f.kind === 'email' && v && !/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(v)) return 'Проверьте адрес электронной почты.';
  }
  if (step.id === 'contacts' && !state.a._consent) return 'Отметьте согласие на обработку данных.';
  return null;
}

function onNext() {
  const step = STEPS[state.i];
  const e = validate(step);
  if (e) { showErr(e); return; }
  if (step.id === 'contacts') { submit(); return; }
  state.i++; render();
}

/* ---- Отправка и отчёт ------------------------------------------------- */
function buildPrompt() {
  const a = state.a;
  const L = [];
  L.push('ДИАГНОСТИЧЕСКИЙ БРИФ. Ответы руководителя компании:');
  L.push('');
  L.push(`1. Отрасль: ${a.industry || '—'}`);
  L.push(`   Размер: ${a.size || '—'} сотрудников. Годовая выручка: ${a.revenue || '—'}. Роль отвечающего: ${a.role || '—'}.`);
  L.push(`2. Главные зоны боли: ${(a.pains || []).join(', ') || '—'}.`);
  if (a.painText) L.push(`   Своими словами: ${a.painText}`);
  L.push(`3. Как принимаются управленческие решения (зрелость данных): ${a.dataMaturity || '—'}`);
  L.push(`4. Зависимость от собственника / ключевых людей: ${a.ownerDependency || '—'}`);
  L.push(`5. Что уже пробовали и почему не сработало: ${a.tried || '—'}`);
  L.push(`6. Желаемый результат: ${a.successResult || '—'}`);
  L.push(`   Готовность к изменениям: ${a.readiness || '—'}. Горизонт первых результатов: ${a.horizon || '—'}. Ориентир бюджета: ${a.budget || 'не указан'}.`);
  L.push('');
  L.push('Дай первичный операционный анализ строго по заданной JSON-схеме.');
  return L.join('\n');
}

const PHASES = ['Разбираю профиль компании…', 'Ищу слабые сигналы в ответах…', 'Оцениваю риски по влиянию на прибыль…', 'Формулирую рекомендации…', 'Собираю отчёт…'];

async function submit() {
  pfill.style.width = '100%';
  stepInd.textContent = '';
  let pi = 0;
  app.innerHTML = `<div class="load"><div class="spinner"></div>
    <h2>Анализируем ваши ответы</h2><p>Обычно занимает 15–30 секунд.</p>
    <div class="phase mono" id="phase">${PHASES[0]}</div></div>`;
  const phaseEl = document.getElementById('phase');
  const timer = setInterval(() => { pi = (pi + 1) % PHASES.length; if (phaseEl) phaseEl.textContent = PHASES[pi]; }, 3200);

  let report = null, apiOk = false;
  try {
    const r = await fetch('/api/generate-report', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt: buildPrompt() })
    });
    const j = await r.json();
    if (r.ok && j.data) { report = j.data; apiOk = true; }
  } catch (err) { console.error('[brief] api error', err); }

  clearInterval(timer);
  sendEmails(report, apiOk);   // не блокируем показ отчёта
  if (apiOk) renderReport(report); else renderPending();
}

function renderReport(d) {
  const a = state.a;

  const horLabel = { quick_win: 'быстрая победа', '1_month': '1 месяц', '3_months': '3 месяца', strategic: 'стратегия' };

    profile.industry && ['Отрасль', profile.industry],

  ].filter(Boolean).map(([k, v]) => `<span class="pill">${esc(k)}: <b>${esc(v)}</b></span>`).join('');

    <div class="risk">

      ${r.signal ? `<p><span class="lab">Сигнал в данных:</span> ${esc(r.signal)}</p>` : ''}
    </div>`).join('');

  const recs = (d.recommendations || []).map(r => `
    <div class="rec">
      <span class="horizon">${esc(horLabel[r.horizon] || r.horizon || '')}</span>
      <div><h4>${esc(r.action || '')}</h4>${r.why ? `<p>${esc(r.why)}</p>` : ''}</div>
    </div>`).join('');

  const ns = d.next_step || {};
  const guarantees = (ns.guarantees || []).map(g => `<span class="g">✓ ${esc(g)}</span>`).join('');

  app.innerHTML = `<div class="report">
    <div class="rep-top">
      <span class="tag mono">Ваш операционный код · ${esc(a.company || '')}</span>

    </div>

    ${risks ? `<div class="rep-sec"><h2>Топ рисков <span class="mono">${(d.top_risks || []).length}</span></h2>${risks}</div>` : ''}
    ${recs ? `<div class="rep-sec"><h2>Что делать в первую очередь</h2>${recs}</div>` : ''}
    ${d.diagnostic_hypothesis ? `<div class="rep-sec"><div class="hypo"><span class="lab mono">Сквозная гипотеза</span>${esc(d.diagnostic_hypothesis)}</div></div>` : ''}

    <div class="next">
      <div class="ns-tag">Рекомендованный следующий шаг</div>
      <h2>${esc(ns.product || 'Экспресс-диагностика')}</h2>
      <div class="ns-meta">${esc(ns.price || '200 000 ₽')} · ${esc(ns.duration || '5–7 рабочих дней')}</div>
      ${ns.why ? `<p>${esc(ns.why)}</p>` : ''}
      ${ns.what_will_get ? `<p><b style="color:#fff">Что получите:</b> ${esc(ns.what_will_get)}</p>` : ''}
      ${guarantees ? `<div class="guarantees">${guarantees}</div>` : ''}
      <a href="mailto:hello@vidim.site?subject=${encodeURIComponent('Экспресс-диагностика — ' + (a.company || ''))}" class="ns-btn">Записаться на диагностику
        <svg viewBox="0 0 24 24" fill="none" width="15" height="15"><path d="M5 12h14M13 6l6 6-6 6" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </a>
    </div>

    <p class="rep-foot">Копия отчёта отправлена на <b>${esc(a.email || '')}</b>.<br>
    Это первичная ИИ-оценка по вашим ответам — не заменяет полную диагностику. Вопросы: <a href="mailto:hello@vidim.site">hello@vidim.site</a></p>
  </div>`;
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function renderPending() {
  const a = state.a;
  app.innerHTML = `<div class="report">
    <div class="rep-top">
      <span class="tag mono">Заявка принята</span>
      <h1>Спасибо! Ответы получили</h1>

    </div>
    <div class="next">
      <div class="ns-tag">Пока суть да дело</div>
      <h2>Экспресс-диагностика</h2>

      <p>Если хотите ускориться — напишите нам, обсудим вашу ситуацию напрямую.</p>
      <a href="mailto:hello@vidim.site?subject=${encodeURIComponent('Бриф — ' + (a.company || ''))}" class="ns-btn">Написать нам
        <svg viewBox="0 0 24 24" fill="none" width="15" height="15"><path d="M5 12h14M13 6l6 6-6 6" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </a>
    </div>
    <p class="rep-foot">Вопросы: <a href="mailto:hello@vidim.site">hello@vidim.site</a></p>
  </div>`;

}

/* ---- EmailJS ---------------------------------------------------------- */
function reportToText(d) {
  if (!d) return 'Автоматический отчёт не сформирован — требуется ручной разбор.';
  const p = d.profile || {};
  let t = `ПРОФИЛЬ: ${p.industry || ''} · ${p.size || ''} · ${p.maturity || ''} · ${p.growth_stage || ''}\n${p.summary || ''}\n\n`;
  t += 'ТОП РИСКОВ:\n';
  (d.top_risks || []).forEach((r, i) => { t += `${i + 1}. [${r.severity || ''}] ${r.title || ''}\n   ${r.what_happens || ''}\n   Грозит: ${r.impact || ''}\n`; });
  t += '\nРЕКОМЕНДАЦИИ:\n';
  (d.recommendations || []).forEach((r, i) => { t += `${i + 1}. (${r.horizon || ''}) ${r.action || ''} — ${r.why || ''}\n`; });
  t += `\nГИПОТЕЗА: ${d.diagnostic_hypothesis || ''}\n`;
  t += `\nСЛЕДУЮЩИЙ ШАГ: ${(d.next_step || {}).product || ''} — ${(d.next_step || {}).why || ''}`;
  return t;
}

// Готовые EmailJS-шаблоны свёрстаны под гранулярные переменные (risk_1_title,
// industry, structure, top_risks…). Собираем их из JSON-отчёта, чтобы красивые
// письма рендерились без правки шаблонов.
function sendEmails(report, apiOk) {
  if (!window.emailjs) return;
  const a = state.a;
  const d = report || {};
  const p = d.profile || {};
  const risks = d.top_risks || [];
  const recs = d.recommendations || [];
  const ns = d.next_step || {};
  const sevRu = { critical: 'критично', high: 'высокий', medium: 'средний' };

  const pad = n => (n < 10 ? '0' : '') + n;
  const now = new Date();
  const sentAt = `${pad(now.getDate())}.${pad(now.getMonth() + 1)}.${now.getFullYear()} ${pad(now.getHours())}:${pad(now.getMinutes())}`;

  const riskLine = r => r ? `${r.title || ''}${r.severity ? ` [${sevRu[r.severity] || r.severity}]` : ''}` : '—';
  const riskFull = (r, i) => r ? `${i}. ${r.title || ''}${r.severity ? ` [${sevRu[r.severity] || r.severity}]` : ''}\n   ${r.what_happens || ''}\n   Чем грозит: ${r.impact || ''}${r.signal ? `\n   Сигнал: ${r.signal}` : ''}` : '';
  const risksListText = risks.map((r, i) => riskFull(r, i + 1)).filter(Boolean).join('\n\n');
  const recsText = recs.map((r, i) => `${i + 1}. ${r.action || ''}${r.why ? ' — ' + r.why : ''}`).join('\n');
  const painsText = (a.pains || []).join(', ') + (a.painText ? ` — ${a.painText}` : '');

  const answers =
    `Отрасль: ${a.industry}\nРазмер: ${a.size} · Выручка: ${a.revenue} · Роль: ${a.role}\n` +
    `Боли: ${(a.pains || []).join(', ')}\n${a.painText ? 'Комментарий: ' + a.painText + '\n' : ''}` +
    `Данные: ${a.dataMaturity}\nЗависимость: ${a.ownerDependency}\n` +
    `Пробовали: ${a.tried}\nУспех: ${a.successResult}\n` +
    `Готовность: ${a.readiness} · Горизонт: ${a.horizon} · Бюджет: ${a.budget || '—'}`;

  const common = {
    // контакты / профиль
    name: a.name || '', client_name: a.name || '', client_email: a.email || '', client_phone: a.phone || '',
    company: a.company || '', company_name: a.company || '',
    industry: a.industry || p.industry || '', company_industry: p.industry || a.industry || '',
    size: a.size || '', company_size: p.size || a.size || '',
    role: a.role || '', company_role: a.role || '', client_role: a.role || '',
    revenue: a.revenue || '', company_revenue: a.revenue || '', budget: a.budget || '—',
    structure: [p.maturity, p.growth_stage].filter(Boolean).join(' · ') || '—',
    // ответы (уведомление команде)
    pains: painsText || '—', expectations: a.successResult || '—', brief_answers: answers,
    // риски (оба письма)
    risk_1: riskLine(risks[0]), risk_2: riskLine(risks[1]), risk_3: riskLine(risks[2]),
    risk_1_title: (risks[0] || {}).title || '', risk_1_impact: (risks[0] || {}).impact || '',
    risk_2_title: (risks[1] || {}).title || '', risk_2_impact: (risks[1] || {}).impact || '',
    risk_3_title: (risks[2] || {}).title || '', risk_3_impact: (risks[2] || {}).impact || '',
    risks_list: risksListText, top_risks: risksListText,
    // отчёт клиенту
    recommendations: recsText, next_step_why: ns.why || '', next_step_price: ns.price || '200 000 ₽',
    report_text: reportToText(report),
    // служебное
    sent_at: sentAt, date: sentAt, session_id: 'brief-' + now.getTime(),
    api_status: apiOk ? 'OK (ИИ-отчёт сформирован)' : 'FALLBACK (нужен ручной разбор)'
  };

  // 1) уведомление команде → hello@vidim.site
  emailjs.send(EMAILJS.service, EMAILJS.tplNotify, common)
    .catch(e => console.error('[brief] notify email failed', e));
  // 2) отчёт клиенту
  if (a.email) emailjs.send(EMAILJS.service, EMAILJS.tplReport, common)
    .catch(e => console.error('[brief] report email failed', e));
}

/* ---- Старт ------------------------------------------------------------ */
render();
</script>
